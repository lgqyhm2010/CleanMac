name: Build DMG

# Rebuild the distributable DMG on every change to main and on every tag,
# so a fresh download is always available. Tags additionally publish the DMG
# as a GitHub Release asset.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          LATEST="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          swift --version

      - name: Run tests
        run: swift test

      - name: Import Developer ID certificate (optional)
        id: import_cert
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "${CERT_B64:-}" ]; then
            echo "No signing certificate secret — building with an ad-hoc signature."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          chmod +x script/*.sh
          ./script/build_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanMac-dmg
          path: dist/CleanMac.dmg
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/CleanMac.dmg \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/CleanMac.dmg --clobber
